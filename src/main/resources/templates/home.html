<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#2e4c9b"
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-lg shadow-md w-96">

    <h1 class="text-2xl text-primary font-bold text-center mb-6">
    Login
    </h1>

      <!-- LOGIN FORM -->
    <form id="login-form">

      <input id="email"
      class="w-full border p-2 rounded mb-3"
      placeholder="Email"
      type="email">

      <input id="password"
      class="w-full border p-2 rounded mb-4"
      placeholder="Senha"
      type="password">

      <button
      type="submit"
      class="bg-primary w-full text-white p-2 rounded">
      Entrar
      </button>

    </form>

    <!-- 2FA FORM -->
    <form id="mfa-form" class="hidden">

      <p class="text-sm text-gray-600 mb-3">
      Digite o código enviado para seu email
      </p>

      <input id="code"
      class="w-full border p-2 rounded mb-4"
      placeholder="Código de verificação"
      type="text">

      <button
      class="bg-primary w-full text-white p-2 rounded"
      type="submit"
      >
      Verificar
      </button>

    </form>

  </div>
  <script th:src="@{/js/login.js}"> </script>
</body>
</html>

<!DOCTYPE html>
<html th:replace="fragments/layout :: layout('Registro', ~{::body})">
<body>

  <main class="flex items-center justify-center h-screen">
    <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md">

      <h1 class="text-2xl font-bold text-center text-primary mb-6">
        Criar conta
      </h1>

      <!-- REGISTRO -->

      <form id="registerForm" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700">Nome</label>
          <input type="text" id="name" required
          class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" id="email" required
          class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Senha</label>
          <input
            type="password"
            id="password"
            required
            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@#$%^&+=!]).{8,}$"
            title="Mínimo 8 caracteres, com maiúscula, minúscula, número e símbolo"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Cargo</label>
          <select id="role"
            class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary">
            <option value="STUDENT">Estudante</option>
            <option value="TEACHER">Professor</option>
            <option value="ADMIN">Admin</option>
          </select>
        </div>

        <div id="register-loading" class="hidden flex justify-center mt-4">
          <div class="animate-spin rounded-full h-6 w-6 border-2 border-gray-300 border-t-primary"></div>
        </div>
        <br>

        <button
          type="submit"
          class="w-full bg-primary text-white py-2 rounded-lg hover:bg-blue-900 transition">
          Registrar </button>

      </form>

      <!-- 2FA -->

      <form id="mfaForm" class="hidden mt-6">

        <label class="block text-sm font-medium text-gray-700">
          Código de verificação
        </label>

        <input id="code"
        type="text"
        placeholder="Digite o código"
        class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary"
        minlength="6"
        inputmode="numeric"
        pattern="\d{6}"
        title="Digite um código de 6 dígitos"
        required
        />

        <div id="mfa-loading" class="hidden flex justify-center mt-4">
          <div class="animate-spin rounded-full h-6 w-6 border-2 border-gray-300 border-t-primary"></div>
        </div>
        <br>

        <button
          type="submit"
          class="w-full mt-4 bg-primary text-white py-2 rounded-lg hover:bg-blue-900 transition">
          Confirmar código </button>

      </form>

      <p class="text-center text-sm text-gray-600 mt-4">
      Já possui conta?
      <a href="/" class="text-primary font-medium hover:underline">
        Entrar
      </a>
      </p>

    </div>

    <script th:src="@{/js/register.js}"> </script>
  </main>

</body>
</html>

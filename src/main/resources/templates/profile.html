
<!DOCTYPE html>

<html th:replace="layout :: layout('Perfil', ~{::body})">

<body>

<div class="flex h-full">

  <div th:replace="fragments/sidebar :: sidebar"></div>

    <main class="flex-1 p-10">

      <h1 class="text-3xl font-bold text-gray-800">
        Meu Perfil
      </h1>

      <div class="mt-8 bg-white shadow rounded-lg p-6 w-full max-w-lg">

        <div class="mb-4">
          <p class="text-sm text-gray-500">Nome</p>
          <p class="text-lg font-semibold text-gray-800"
             th:text="${user.name}">
            Nome do Usuário
          </p>
        </div>

        <div>
          <p class="text-sm text-gray-500">Email</p>
          <p class="text-lg font-semibold text-gray-800"
             th:text="${user.email}">
            email@exemplo.com
          </p>
        </div>

      </div>

      <div class="mt-8 bg-white shadow rounded-lg p-6 w-full max-w-lg">

          <h2 class="text-xl font-bold text-gray-800 mb-4">
            Alterar senha
          </h2>

          <!-- Senha atual -->
          <div class="mb-4">
            <label class="text-sm text-gray-600">Senha atual</label>
            <input type="password" id="currentPassword"
                   class="w-full mt-1 p-2 border rounded" />
          </div>

          <div id="validate-loading" class="hidden flex justify-center mt-4">
            <div class="animate-spin rounded-full h-6 w-6 border-2 border-gray-300 border-t-primary"></div>
          </div>
          <br>

          <button id="validate-btn"
                  class="bg-primary text-white px-4 py-2 rounded">
            Validar senha
          </button>

          <!-- Nova senha (inicialmente escondido) -->
          <form id="newPasswordSection" class="mt-6 hidden">

            <div class="mb-4">
              <label class="text-sm text-gray-600">Nova senha</label>
              <input type="password" id="newPassword"
                     class="w-full mt-1 p-2 border rounded"
                     required
                     pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@#$%^&+=!]).{8,}$"
                     title="Mínimo 8 caracteres, com maiúscula, minúscula, número e símbolo"
                     />
            </div>

            <div class="mb-4">
              <label class="text-sm text-gray-600">Confirme a nova senha</label>
              <input type="password" id="confirmPassword"
                     class="w-full mt-1 p-2 border rounded"
                     required
                     pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@#$%^&+=!]).{8,}$"
                     title="Mínimo 8 caracteres, com maiúscula, minúscula, número e símbolo"
                     />
            </div>

            <div id="change-loading" class="hidden flex justify-center mt-4">
              <div class="animate-spin rounded-full h-6 w-6 border-2 border-gray-300 border-t-primary"></div>
            </div>
            <br>

            <button type="submit"
                    class="bg-green-600 text-white px-4 py-2 rounded">
              Alterar senha
            </button>

          </div>

      </div>

    </main>

  </div>

  <script th:src="@{/js/dashboard.js}"></script>
  <script th:src="@{/js/password.js}"></script>

</body>
</html>

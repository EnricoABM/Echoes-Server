<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Recuperar Senha</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#2e4c9b"
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-lg shadow-md w-96">

    <h1 class="text-2xl text-primary font-bold text-center mb-6">
      Recuperar Senha
    </h1>

    <!-- STEP 1: EMAIL -->
    <form id="recover-form">

      <input id="email"
        class="w-full border p-2 rounded mb-4"
        placeholder="Email"
        type="email">

      <button
        type="submit"
        class="bg-primary w-full text-white p-2 rounded">
        Enviar código
      </button>

    </form>

    <!-- STEP 2: CODE + NEW PASSWORD -->
    <form id="reset-form" class="hidden">

      <p class="text-sm text-gray-600 mb-3">
        Digite o código enviado para seu email
      </p>

      <input id="code"
        class="w-full border p-2 rounded mb-3"
        placeholder="Código"
        type="text"
        minlength="6"
        >

      <input id="new-password"
        class="w-full border p-2 rounded mb-4"
        placeholder="Nova senha"
        type="password">

      <button
        class="bg-primary w-full text-white p-2 rounded"
        type="submit">
        Redefinir senha
      </button>

    </form>

    <p class="text-center text-sm text-gray-600 mt-4">
      Lembrou a senha?
      <a href="/" class="text-primary font-medium hover:underline">
        Voltar ao login
      </a>
    </p>

  </div>

  <script th:src="@{/js/recover.js}"></script>
</body>
</html>
